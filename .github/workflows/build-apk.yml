name: Build APK from ZIP

on:
  push:
    branches:
      - main
    paths:
      - "GeoTopo_Source.zip"
      - ".github/workflows/build-apk.yml"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar paquetes Android
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Leer y descomprimir ZIP automáticamente
        run: |
          if [ ! -f "GeoTopo_Source.zip" ]; then
            echo "ERROR: No existe GeoTopo_Source.zip en el repositorio."
            exit 1
          fi

          rm -rf extracted
          unzip -o GeoTopo_Source.zip -d extracted

          PROJECT_DIR=$(dirname "$(find extracted -name settings.gradle | head -n 1)")

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: No se encontró settings.gradle dentro del ZIP."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Proyecto encontrado en: $PROJECT_DIR"

      - name: Descargar Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Compilar APK
        run: ./gradle-8.10.2/bin/gradle -p "$PROJECT_DIR" assembleDebug --no-daemon

      - name: Subir APK compilada
        uses: actions/upload-artifact@v4
        with:
          name: GeoTopo-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
