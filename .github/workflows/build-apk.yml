name: Build APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Buscar ZIP automáticamente
        id: findzip
        shell: bash
        run: |
          echo "Buscando archivo ZIP..."

          # 1) Primero intenta usar el ZIP que cambió en este commit
          CHANGED_ZIP=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" | grep -Ei '\.zip$' | head -n 1 || true)

          if [ -n "$CHANGED_ZIP" ] && [ -f "$CHANGED_ZIP" ]; then
            ZIP_FILE="$CHANGED_ZIP"
          else
            # 2) Si no encuentra, busca cualquier ZIP en la raíz del repo
            ZIP_FILE=$(find . -maxdepth 1 -type f -iname "*.zip" | head -n 1 || true)
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "No hay ZIP para compilar. Se termina sin error."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ZIP encontrado: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Instalar Java
        if: steps.findzip.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Extraer ZIP
        if: steps.findzip.outputs.skip == 'false'
        shell: bash
        run: |
          rm -rf extracted
          mkdir extracted
          unzip -q "${{ steps.findzip.outputs.zip_file }}" -d extracted

          echo "Contenido extraído:"
          find extracted -maxdepth 3 -type f | head -n 50

      - name: Buscar proyecto Gradle
        if: steps.findzip.outputs.skip == 'false'
        id: project
        shell: bash
        run: |
          PROJECT_DIR=$(find extracted -type f -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs -r dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No se encontró settings.gradle dentro del ZIP."
            exit 1
          fi

          echo "Proyecto encontrado en: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Dar permisos a Gradle Wrapper
        if: steps.findzip.outputs.skip == 'false'
        shell: bash
        run: |
          cd "${{ steps.project.outputs.project_dir }}"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Compilar APK
        if: steps.findzip.outputs.skip == 'false'
        shell: bash
        run: |
          cd "${{ steps.project.outputs.project_dir }}"

          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Subir APK generado
        if: steps.findzip.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: GeoTopo-APK
          path: |
            ${{ steps.project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
